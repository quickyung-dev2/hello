name: macOS AnyDesk Unattended Setup (Debug Headless 2026)

on:
  workflow_dispatch:

jobs:
  anydesk-setup:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Tải anydesk.dmg (9.6.3 ~26.1MB)
        run: |
          curl --http1.1 -L --retry 10 --retry-delay 5 --retry-connrefused \
            -A "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" \
            https://download.anydesk.com/anydesk.dmg -o anydesk.dmg
          
          FILE_SIZE=$(stat -f%z anydesk.dmg 2>/dev/null || stat -c%s anydesk.dmg || echo 0)
          if [ "$FILE_SIZE" -lt 20000000 ]; then
            echo "Download fail ($FILE_SIZE bytes)"; ls -lh anydesk.dmg; exit 1
          fi
          echo "Download OK: $(du -sh anydesk.dmg)"

      - name: Mount và copy AnyDesk.app
        run: |
          hdiutil attach anydesk.dmg -nobrowse -quiet || { echo "Attach fail"; exit 1; }
          sudo cp -R "/Volumes/AnyDesk/AnyDesk.app" /Applications/
          hdiutil detach "/Volumes/AnyDesk" -quiet
          rm anydesk.dmg
          ls -l /Applications/AnyDesk.app

      - name: Debug start AnyDesk (thử nhiều cách init service/client)
        run: |
          echo "Thử start service..."
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service > service.log 2>&1 || true
          sleep 5
          
          echo "Thử start client background..."
          nohup /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --verbose > client.log 2>&1 &
          CLIENT_PID=$!
          sleep 20
          
          echo "=== Service log ==="
          cat service.log || true
          echo "=== Client log ==="
          cat client.log || true
          ps aux | grep AnyDesk || echo "No AnyDesk process running"
          echo "Client PID: $CLIENT_PID (nếu >0 thì đang chạy)"

      - name: Thử set unattended password (ignore fail headless)
        run: |
          PASSWORD="MatKhau123!@#"
          echo "$PASSWORD" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password > setpw.log 2>&1 || true
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password --verbose >> setpw.log 2>&1 || true
          cat setpw.log || true
          echo "Password attempt: $PASSWORD (check nếu có 'success' trong log)"

      - name: Lấy AnyDesk ID (nếu client connect được)
        run: |
          ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id | grep -o '[0-9 ]\{9,11\}' || echo "ID not generated (service/client not connected)")
          echo "AnyDesk ID: $ID"
          echo "Nếu ID có, connect từ máy khác + pass $PASSWORD → thử auto accept"

      - name: Keep alive (nếu ID có thì dùng được)
        run: |
          while true; do
            echo "[$(date)] AnyDesk debug alive | ID: $ID | Pass: MatKhau123!@#"
            sleep 300
          done
