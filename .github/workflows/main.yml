name: macOS AnyDesk Unattended Access + Keep Alive

on:
  workflow_dispatch:  # Chạy thủ công từ Actions tab

jobs:
  anydesk-setup:
    runs-on: macos-latest
    timeout-minutes: 360  # Max 6h free tier

    steps:
      - name: Checkout repo (nếu cần file thêm)
        uses: actions/checkout@v4

      - name: Tải và install AnyDesk silent (DMG -> copy app)
        run: |
          curl -L -o AnyDesk.dmg https://junofurstore.qzz.io/anydesk.dmg
          hdiutil attach AnyDesk.dmg -nobrowse -quiet
          sudo cp -R "/Volumes/AnyDesk/AnyDesk.app" /Applications/
          hdiutil detach "/Volumes/AnyDesk" -quiet
          echo "AnyDesk installed to /Applications/AnyDesk.app"

      - name: Set unattended access password (auto accept khi connect)
        run: |
          PASSWORD="123456Hi"  # Thay pass mạnh của mày
          echo "$PASSWORD" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          echo "Password unattended set: $PASSWORD (auto accept khi connect đúng pass)"

      - name: Lấy AnyDesk ID (mã connect)
        run: |
          ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id | grep -o '[0-9 ]\{9,11\}')
          echo "AnyDesk ID: $ID"
          echo "Connect từ máy khác: Nhập ID này + pass 123456Hi là auto vào full control"

      - name: Start AnyDesk service background (chạy khi logout/reboot nếu máy thật)
        run: |
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service || true
          echo "AnyDesk service started (background mode)"

      - name: Keep alive loop (giữ job sống để AnyDesk active)
        run: |
          echo "AnyDesk unattended active... Job giữ 6h max, re-run khi gần hết."
          while true; do
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] AnyDesk vẫn sống. ID: $ID | Pass: 123456Hi"
            sleep 300  # In log mỗi 5 phút
          done
