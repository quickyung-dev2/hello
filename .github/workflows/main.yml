name: macOS AnyDesk Unattended (Fix Service Connect)

on:
  workflow_dispatch:

jobs:
  anydesk-setup:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Tải và install AnyDesk (force HTTP/1.1 tránh error cũ)
        run: |
          curl --http1.1 -L --retry 10 --retry-delay 5 \
            -A "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" \
            https://download.anydesk.com/anydesk.dmg -o AnyDesk.dmg
          
          if [ ! -f AnyDesk.dmg ] || [ $(stat -f%z AnyDesk.dmg) -lt 60000000 ]; then
            echo "Download fail"; exit 1
          fi
          
          hdiutil attach AnyDesk.dmg -nobrowse -quiet
          sudo cp -R "/Volumes/AnyDesk/AnyDesk.app" /Applications/
          hdiutil detach "/Volumes/AnyDesk" -quiet
          rm AnyDesk.dmg
          echo "Installed OK"

      - name: Force start AnyDesk client (để init service)
        run: |
          # Start client background để service có thể connect
          nohup /Applications/AnyDesk.app/Contents/MacOS/AnyDesk > anydesk.log 2>&1 &
          sleep 15  # Chờ client init và connect server
          cat anydesk.log || true
          echo "Client started (check log nếu có error network)"

      - name: Set unattended password (sau khi client chạy)
        run: |
          PASSWORD="MatKhau123!@#"
          echo "$PASSWORD" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password || {
            echo "Set password fail (có thể do headless runner), nhưng thử continue..."
            sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password --verbose || true
          }
          echo "Password set: $PASSWORD (nếu fail thì manual sau)"

      - name: Lấy AnyDesk ID (luôn chạy được)
        run: |
          ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id | grep -o '[0-9 ]\{9,11\}' || echo "ID not available yet")
          echo "AnyDesk ID: $ID"
          echo "Nếu ID hiện, connect từ máy khác + pass là auto (nếu service sống)"

      - name: Start service explicit (nếu có)
        run: |
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service || true
          echo "Service attempt done"

      - name: Keep alive
        run: |
          while true; do
            echo "[$(date)] AnyDesk running. ID: $ID | Pass: MatKhau123!@#"
            sleep 300
          done
